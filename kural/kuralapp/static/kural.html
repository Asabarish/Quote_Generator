<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Thirukkural Generator</title>

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
background:#f5f5f5;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
text-align:center;
width:400px;
}

button{
padding:10px 20px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2e8b57;
}

footer{
margin-top:20px;
}

</style>
</head>

<body>

<h1>Thirukkural Generator</h1>

<div class="box">

<h3 id="number">Kural Number</h3>

<p id="kural">Click the button to see a Thirukkural</p>

<p id="meaning"></p>

<button onclick="generateKural()">Get Thirukkural</button>

</div>

<footer>
<p>Name: Sabarish A | Reg No: 25004630</p>
</footer>

<script>

var kurals = [

{
number:1,
kural:"அகர முதல எழுத்தெல்லாம் ஆதி பகவன் முதற்றே உலகு",
meaning:"Just as the letter 'A' is the first of all letters, God is the first in the world."
},

{
number:2,
kural:"கற்றதனால் ஆய பயனென்கொல் வாலறிவன் நற்றாள் தொழாஅர் எனின்",
meaning:"What is the use of learning if one does not worship the feet of God."
},

{
number:3,
kural:"மலர்மிசை ஏகினான் மாணடி சேர்ந்தார் நிலமிசை நீடுவாழ் வார்",
meaning:"Those who reach the feet of God will live happily in this world."
}

];

function generateKural(){

var randomIndex = Math.floor(Math.random()*kurals.length);

var data = kurals[randomIndex];

document.getElementById("number").innerText = "Kural No: " + data.number;

document.getElementById("kural").innerText = data.kural;

document.getElementById("meaning").innerText = data.meaning;

}

</script>

</body>
</html>
